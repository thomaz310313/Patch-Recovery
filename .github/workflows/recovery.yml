name: RECOVERY-PATCH

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL: https://files.catbox.moe/17m8e6.img
        description: 'Link direto da sua recovery.img original'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Check Out
      uses: actions/checkout@v4

    - name: Prepare the environment
      run: |
        sudo apt update
        sudo apt install git wget lz4 tar openssl python3 -y

    - name: Fetch image from URL
      run: |
        wget "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img
        # Verifica se o download funcionou
        if [ ! -f recovery.img ]; then echo "Erro ao baixar imagem!"; exit 1; fi

    - name: Patch Process-1 (Unpack)
      run: |
        chmod a+x script1.sh
        chmod a+x magiskboot
        ./script1.sh recovery.img || true

    - name: Patch Process-2 (Repack & Sign)
      run: |
        chmod a+x script2.sh
        ./script2.sh || true
        
        # Identificar qual arquivo o script gerou e renomear para o padrão
        if [ -f r-patched.img ]; then
            mv r-patched.img recovery-patched.img
        elif [ -f new-boot.img ]; then
            mv new-boot.img recovery-patched.img
        else
            echo "Erro: Nenhum arquivo de saída encontrado após o script2!"
            exit 1
        fi

        # Extrair chave pública
        python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
        
        # ASSINATURA CRÍTICA PARA SAMSUNG A03 (Unisoc)
        # Usamos 40MB (tamanho padrão) e desativamos o hashtree para evitar Panic
        python3 avbtool add_hash_footer \
          --partition_name recovery \
          --partition_size 41943040 \
          --image recovery-patched.img \
          --key phh.pem \
          --algorithm SHA256_RSA4096 \
          --set_hashtree_disabled_flag

        # Preparar pacote para o Odin
        mkdir output
        cp recovery-patched.img output/recovery.img
        cd output
        tar -cvf fastbootd-recovery.tar recovery.img
        
        # Gerar MD5 no padrão binário que o Odin exige
        md5sum -b fastbootd-recovery.tar >> fastbootd-recovery.tar
        mv fastbootd-recovery.tar fastbootd-recovery.tar.md5

    - name: Upload to Release
      uses: softprops/action-gh-release@v2
      with:
        files: output/fastbootd-recovery.tar.md5
        name: Patched-Recovery-A03
        tag_name: build-${{ github.run_id }}
        body: |
          Recovery com Fastbootd habilitado para Galaxy A03.
          Flash via Odin no slot AP ou USERDATA.
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
