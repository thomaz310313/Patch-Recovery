name: RECOVERY-PATCH

on:
  workflow_dispatch:
    inputs:
      RECOVERY_URL:
        description: 'Link direto da sua recovery.img'
        required: true
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check Out
        uses: actions/checkout@v4

      - name: Prepare the environment
        run: |
          sudo apt update
          sudo apt install git wget lz4 tar openssl python3 -y

      - name: Fetch image from URL
        run: |
          wget "${{ github.event.inputs.RECOVERY_URL }}" -O recovery.img
          if [ ! -f recovery.img ]; then echo "Erro ao baixar!"; exit 1; fi

      - name: Patch Process-1
        run: |
          chmod a+x script1.sh
          chmod a+x magiskboot
          ./script1.sh recovery.img || true

      - name: Patch Process-2
        run: |
          chmod a+x script2.sh
          ./script2.sh || true
          
          if [ -f r-patched.img ]; then
              mv r-patched.img recovery-patched.img
          elif [ -f new-boot.img ]; then
              mv new-boot.img recovery-patched.img
          fi

          python3 avbtool extract_public_key --key phh.pem --output phh.pub.bin
          
          python3 avbtool add_hash_footer \
            --partition_name recovery \
            --partition_size 41943040 \
            --image recovery-patched.img \
            --key phh.pem \
            --algorithm SHA256_RSA4096 \
            --set_hashtree_disabled_flag

          mkdir output
          cp recovery-patched.img output/recovery.img
          cd output
          tar -cvf fastbootd-recovery.tar recovery.img
          md5sum -b fastbootd-recovery.tar >> fastbootd-recovery.tar
          mv fastbootd-recovery.tar fastbootd-recovery.tar.md5

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/fastbootd-recovery.tar.md5
          name: Patched-Recovery-A03
          tag_name: build-${{ github.run_id }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
